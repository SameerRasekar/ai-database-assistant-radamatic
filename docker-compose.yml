services:
  app:
    build: .
    ports:
      - "8000:80"                   # Maps host port 8000 to container port 80
    environment:
      - DATABASE_URL=${DATABASE_URL}  # Pass database URL from .env file
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_TABLE_NAME=${POSTGRES_TABLE_NAME}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - OPENAI_API_TYPE=${OPENAI_API_TYPE}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_API_BASE=${OPENAI_API_BASE}
      - OPENAI_API_VERSION=${OPENAI_API_VERSION}
      - DEPLOYMENT_NAME=${DEPLOYMENT_NAME}
      - HUGGINGFACE_ACCESS_KEY=${HUGGINGFACE_ACCESS_KEY}
      - DEBUG=${DEBUG}
      - APP_ENV=${APP_ENV}
    depends_on:
      - db                          # Ensures the app waits for the database to be ready
    volumes:
      - .:/app                      # Mounts the project directory into the container
    container_name: fastapi_app

  db:
    image: postgres:14              # Official PostgreSQL image
    environment:
      POSTGRES_USER: ${POSTGRES_USER}  # Database username from .env
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}  # Database password from .env
      POSTGRES_DB: ${POSTGRES_DB}  # Database name from .env
    ports:
      - "5432:5432"                 # Maps host port 5432 to container port 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data  # Persistent database storage
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql # Initialization script
    container_name: postgres_db

volumes:
  postgres_data:                     # Named volume for database data
